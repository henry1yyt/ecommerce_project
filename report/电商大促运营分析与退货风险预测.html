panel('overview',`<div class="head"><span>01 / BUSINESS PULSE</span><h2>核心经营指标</h2></div><div class="kpis">${[['GMV',money(D.kpi.GMV)],['净销售额',money(D.kpi.净销售额)],['净利润',money(D.kpi.净利润)],['退货率',pct(D.kpi.退货率)],['用户数',num(D.kpi.用户数)]].map(x=>`<div class="kpi"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('')}</div><div class="head"><h2>趋势与结构</h2></div><div class="grid"><div class="card"><img src="../outputs/figures/01_monthly_gmv_trend.png"><p class="note">大促月份带来明显增长，但应同时观察净利润与退货率。</p></div><div class="card"><img src="../outputs/figures/02_category_gmv_return.png"><p class="note">高 GMV 品类不一定拥有更低售后风险。</p></div></div>`);
panel('operation',`<div class="head"><span>02 / OPERATION</span><h2>品类、渠道与活动</h2></div><div class="grid"><div class="card"><h3>品类表现</h3>${table(D.category,['category','GMV','净利润','退货率','利润率'])}</div><div class="card"><h3>渠道表现</h3>${table(D.channel,['sales_channel','ROI','净利润','退货率'])}</div><div class="card"><img src="../outputs/figures/03_channel_roi.png"></div><div class="card"><h3>活动表现</h3>${table(D.campaign,['campaign_name','订单量','GMV','净利润','退货率','ROI'])}</div><div class="card full"><h3>A/B 测试</h3><p>B 组相对 A 组人均消费变化 <span class="pill">${pct(D.ab.提升率)}</span>，p=${num(D.ab.p值)}。${D.ab.显著?'在 5% 显著性水平下差异显著。':'在 5% 显著性水平下，尚无充分证据证明差异显著。'} 检验以用户为单位，并对极端用户消费做 99% Winsorize。</p></div></div>`);
function heat(){let R=D.retention,cols=R.columns,rows=R.index,out=`<div class="heat" style="grid-template-columns:100px repeat(${cols.length},58px)"><div></div>${cols.map(c=>`<div>第${c}月</div>`).join('')}`;rows.forEach((r,i)=>{out+=`<div>${r}</div>`;R.data[i].forEach(v=>out+=v===null?`<div></div>`:`<div style="background:rgba(19,111,104,${.12+.82*v});color:${v>.55?'white':'#14212a'}">${pct(v)}</div>`)});return out+'</div>'}
panel('customer',`<div class="head"><span>03 / CUSTOMER</span><h2>同期群与 RFM 用户分群</h2></div><div class="grid"><div class="card full"><h3>同期群留存率</h3>${heat()}</div><div class="card"><img src="../outputs/figures/05_kmeans_selection.png"><p class="note">选择 K=4，兼顾轮廓系数与四类运营策略的可解释性。</p></div><div class="card"><img src="../outputs/figures/06_rfm_segments.png"></div><div class="card full"><h3>用户分群摘要</h3>${table(D.rfm,['用户分群','用户数','R','F','M','价值分'])}</div></div>`);
panel('risk',`<div class="head"><span>04 / RISK MODEL</span><h2>退货风险预警</h2></div><div class="grid"><div class="card"><img src="../outputs/figures/07_model_roc.png"><p class="note">模型仅使用下单时已知字段，避免评分、退货原因和实际配送天数等事后变量造成数据泄漏。</p></div><div class="card"><img src="../outputs/figures/08_risk_profile_test.png"><p class="note">高、中、低风险层由验证集概率分位点确定，并在独立测试集上校验。</p></div><div class="card full"><h3>模型评估</h3>${table(D.model,['模型','测试集AUC','测试集PR_AUC','阈值','Precision','Recall','F1'])}<p class="note">阈值选择采用 F2 最大原则，更重视召回真实退货订单，适合“预警后人工复核”的业务场景。</p></div><div class="card full"><h3>测试集风险分层</h3>${table(D.risk,['risk_level','订单数','退货数','实际退货率','平均风险分'])}</div><div class="card full"><h3>业务动作</h3><div class="flow"><div class="step"><b>高风险</b>发货前确认尺码、型号、地址和购买意愿</div><div class="step"><b>中风险</b>强化详情提示与售后提醒</div><div class="step"><b>低风险</b>正常履约，减少人工打扰</div><div class="step"><b>指标监控</b>持续跟踪 AUC、Recall 与层间退货率</div><div class="step"><b>结果回流</b>定期用真实退货结果更新模型</div><div class="step"><b>合规边界</b>不使用敏感属性实施差别待遇</div></div></div></div>`);
panel('method',`<div class="head"><span>05 / STORY</span><h2>完整链路与业务结论</h2></div><div class="flow"><div class="step"><b>1 问题提出</b>增长、利润、用户和退货四类痛点</div><div class="step"><b>2 数据获取</b>课程 demo 100 条作为种子</div><div class="step"><b>3 AI 规则扩展</b>生成约 6000 条业务模拟订单</div><div class="step"><b>4 数据清洗</b>去重、补缺、类型校验和异常过滤</div><div class="step"><b>5 分析建模</b>统计、检验、聚类和分类</div><div class="step"><b>6 展示表达</b>CSV、图表、模型与 HTML 报告</div></div><div class="head"><h2>数据驱动的建议</h2></div>${D.conclusions.map((x,i)=>`<div class="story"><b>${i+1}.</b> ${x}</div>`).join('')}<div class="grid"><div class="card full"><h3>清洗审计</h3>${table(D.cleaning,['检查项','数量'])}</div><div class="card full"><h3>项目边界</h3><p class="note">本项目使用教学模拟数据，模型结果适合展示完整分析流程，不应直接替代真实企业的业务实验、财务核算或生产决策。实际落地需使用真实曝光、转化、库存、客服和退货原因数据进行再训练与监控。</p></div></div>`);
function show(id){document.querySelectorAll('.panel').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.id===id))}nav.onclick=e=>{if(e.target.dataset.id){show(e.target.dataset.id);requestAnimationFrame(armMotion)}};show('overview');

const glow=document.createElement('div');glow.className='cursor-glow';document.body.appendChild(glow);
document.addEventListener('pointermove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';document.querySelectorAll('.card:hover,.kpi:hover').forEach(el=>{const r=el.getBoundingClientRect();el.style.setProperty('--mx',(e.clientX-r.left)+'px');el.style.setProperty('--my',(e.clientY-r.top)+'px')})});
const best=D.model.slice().sort((a,b)=>b['测试集AUC']-a['测试集AUC'])[0], hi=D.risk.find(x=>x.risk_level==='高风险'), lo=D.risk.find(x=>x.risk_level==='低风险');
document.querySelector('#heroGmv').textContent=money(D.kpi.GMV);
document.querySelector('#heroAuc').textContent=(best['测试集AUC']*100).toFixed(1)+'%';
document.querySelector('#heroLift').textContent=(hi['实际退货率']/lo['实际退货率']).toFixed(1)+'×';
function animateNumber(el){if(el.dataset.done)return;el.dataset.done=1;const raw=el.textContent,match=raw.replace(/,/g,'').match(/-?\d+(\.\d+)?/);if(!match)return;const target=+match[0],start=performance.now(),duration=900;function tick(now){const p=Math.min(1,(now-start)/duration),e=1-Math.pow(1-p,4),v=target*e;el.textContent=raw.replace(match[0],target%1?v.toFixed(1):Math.round(v).toLocaleString());if(p<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}
const observer=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');e.target.querySelectorAll('.value').forEach(animateNumber);observer.unobserve(e.target)}}),{threshold:.12});
function armMotion(){document.querySelectorAll('.panel.active .card,.panel.active .kpi,.panel.active .story,.panel.active .step').forEach((el,i)=>{el.classList.add('reveal');el.style.transitionDelay=Math.min(i*45,260)+'ms';observer.observe(el)})}
armMotion();

</script>
</body></html>
